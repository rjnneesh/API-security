<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Sentinel — Login</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">🛡️</span>
      <h1>API SENTINEL</h1>
      <p>ENTERPRISE SECURITY MONITORING SYSTEM</p>
    </div>

    <!-- Login Card -->
    <div class="auth-card">
      <h2>Authenticate</h2>

      <!-- Alert Messages -->
      <div id="alertBox" class="alert"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="admin@company.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span id="loginBtnText">ACCESS SYSTEM</span>
          <span id="loginSpinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>

    <!-- Footer link -->
    <div class="auth-footer">
      No account? <a href="pages/register.html">Register here</a>
    </div>

    <!-- Demo credentials hint -->
    <div class="auth-footer mt-2" style="font-size:0.75rem; opacity: 0.6;">
      Demo: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="3f5e5b5256517f4b5a4c4b115c5052">[email&#160;protected]</a> / admin123
    </div>
  </div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
  <script>
    // =============================================
    // LOGIN PAGE LOGIC
    // =============================================

    const API_BASE_URL = 'https://api-security-5q8p.onrender.com';
    const buildApiUrl = (path) => `${API_BASE_URL}${path.startsWith('/') ? path : `/${path}`}`;

    // If already logged in, redirect to dashboard
    const token = localStorage.getItem('token');
    if (token) window.location.href = 'pages/dashboard.html';

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginSpinner = document.getElementById('loginSpinner');

    // Show alert helper
    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type} show`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        return showAlert('Please fill in all fields');
      }

      // Show loading state
      loginBtnText.textContent = 'AUTHENTICATING...';
      loginSpinner.classList.remove('hidden');
      loginBtn.disabled = true;

      try {
        const res = await fetch(buildApiUrl('/api/auth/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          // Store token and user info in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          showAlert(`Welcome back, ${data.user.username}! Redirecting...`, 'success');
          
          // Redirect to dashboard after short delay
          setTimeout(() => {
            window.location.href = '/pages/dashboard.html';
          }, 1000);
        } else {
          showAlert(data.message || 'Login failed. Check your credentials.');
        }
      } catch (err) {
        showAlert('Cannot connect to server. Please try again later.');
        console.error(err);
      } finally {
        // Restore button state
        loginBtnText.textContent = 'ACCESS SYSTEM';
        loginSpinner.classList.add('hidden');
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
